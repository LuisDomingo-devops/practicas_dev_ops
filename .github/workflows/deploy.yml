script: |
            # 1. Entrar a la carpeta (si no existe, la clona)
            [ -d "practicas_dev_ops" ] || git clone git@github.com:LuisDomingo-devops/practicas_dev_ops.git
            cd ~/practicas_dev_ops
            
            # 2. Actualizar código
            git pull origin main
            
            # 3. Re-construir y lanzar
            docker build -t app-nube .
            docker stop mi-app-azure || true
            docker rm mi-app-azure || true
            docker run -d --name mi-app-azure -e NOMBRE="Luis_Nube_Automatizada" app-nube
